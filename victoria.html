<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mural da Turma</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .post-animation {
      animation: aparecer 0.4s ease;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="bg-pink-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Cabeçalho -->
  <header class="bg-pink-200 shadow-md p-5">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-bold text-pink-800">
        📚 Mural da Turma
      </h1>

      <nav class="space-x-4 font-semibold">
        <a href="#" class="hover:text-pink-700">Início</a>
        <a href="#" class="hover:text-pink-700">Postagens</a>
        <a href="#" class="hover:text-pink-700">Contato</a>
      </nav>
    </div>
  </header>

  <!-- Conteúdo -->
  <main class="flex-1 max-w-5xl mx-auto w-full p-5">

    <!-- Formulário -->
    <section class="bg-white rounded-2xl shadow-lg p-6 mb-8">

      <h2 class="text-2xl font-bold text-pink-700 mb-4">
        Criar Postagem
      </h2>

      <input
        type="text"
        id="titulo"
        placeholder="Título da postagem"
        class="w-full border border-pink-200 rounded-xl p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-pink-300"
      >

      <textarea
        id="conteudo"
        rows="4"
        placeholder="Escreva algo para a turma..."
        class="w-full border border-pink-200 rounded-xl p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-pink-300"
      ></textarea>

      <!-- Upload de imagem -->
      <div class="mb-4">
        <label class="font-semibold text-pink-700">
          Upload de imagem:
        </label>

        <input
          type="file"
          id="imagem"
          accept="image/*"
          class="mt-2 block"
        >
      </div>

      <button
        onclick="criarPost()"
        class="bg-pink-500 hover:bg-pink-600 text-white px-6 py-3 rounded-xl font-bold transition"
      >
        Publicar
      </button>

    </section>

    <!-- Sessão de posts -->
    <section>

      <h2 class="text-2xl font-bold text-pink-700 mb-5">
        Postagens da Turma
      </h2>

      <div id="posts" class="space-y-6">

        <!-- Post inicial -->
        <div class="bg-white rounded-2xl shadow-lg p-5 post-animation">

          <h3 class="text-xl font-bold text-pink-700 mb-2">
            Bem-vindos!
          </h3>

          <p class="mb-4">
            Esse é o mural da turma. Compartilhe avisos,
            atividades e comentários!
          </p>

          <div class="flex gap-4 mb-4">
            <button onclick="curtir(this)" class="bg-pink-100 px-4 py-2 rounded-lg hover:bg-pink-200">
              👍 Curtir (<span>0</span>)
            </button>

            <button onclick="discurtir(this)" class="bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200">
              👎 Discurtir (<span>0</span>)
            </button>
          </div>

          <!-- Comentários -->
          <div class="mt-4">
            <input
              type="text"
              placeholder="Escreva um comentário..."
              class="comentarioInput border rounded-lg p-2 w-full mb-2"
            >

            <button
              onclick="adicionarComentario(this)"
              class="bg-pink-400 text-white px-4 py-2 rounded-lg hover:bg-pink-500"
            >
              Comentar
            </button>

            <div class="comentarios mt-4 space-y-2"></div>
          </div>

        </div>

      </div>
    </section>

  </main>

  <!-- Rodapé -->
  <footer class="bg-pink-200 mt-10 p-5 text-center text-pink-800 font-semibold">
    © 2026 - Mural da Turma | Desenvolvido em HTML, Tailwind e JavaScript
  </footer>

  <script>

    // Criar postagem
    function criarPost() {

      const titulo = document.getElementById("titulo").value;
      const conteudo = document.getElementById("conteudo").value;
      const imagem = document.getElementById("imagem").files[0];

      if (titulo.trim() === "" || conteudo.trim() === "") {
        alert("Preencha o título e o conteúdo!");
        return;
      }

      const posts = document.getElementById("posts");

      const post = document.createElement("div");
      post.className = "bg-white rounded-2xl shadow-lg p-5 post-animation";

      let imagemHTML = "";

      if (imagem) {
        const imagemURL = URL.createObjectURL(imagem);

        imagemHTML = `
          <img
            src="${imagemURL}"
            class="rounded-xl mt-4 max-h-96 object-cover w-full"
          >
        `;
      }

      post.innerHTML = `
        <h3 class="text-xl font-bold text-pink-700 mb-2">
          ${titulo}
        </h3>

        <p class="mb-4">
          ${conteudo}
        </p>

        ${imagemHTML}

        <div class="flex gap-4 mt-4 mb-4">

          <button onclick="curtir(this)"
            class="bg-pink-100 px-4 py-2 rounded-lg hover:bg-pink-200">
            👍 Curtir (<span>0</span>)
          </button>

          <button onclick="discurtir(this)"
            class="bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200">
            👎 Discurtir (<span>0</span>)
          </button>

        </div>

        <div class="mt-4">

          <input
            type="text"
            placeholder="Escreva um comentário..."
            class="comentarioInput border rounded-lg p-2 w-full mb-2"
          >

          <button
            onclick="adicionarComentario(this)"
            class="bg-pink-400 text-white px-4 py-2 rounded-lg hover:bg-pink-500"
          >
            Comentar
          </button>

          <div class="comentarios mt-4 space-y-2"></div>

        </div>
      `;

      posts.prepend(post);

      // Limpar campos
      document.getElementById("titulo").value = "";
      document.getElementById("conteudo").value = "";
      document.getElementById("imagem").value = "";

    }

    // Curtidas
    function curtir(botao) {
      let span = botao.querySelector("span");
      let numero = Number(span.innerText);
      numero++;
      span.innerText = numero;
    }

    // Discurtidas
    function discurtir(botao) {
      let span = botao.querySelector("span");
      let numero = Number(span.innerText);
      numero++;
      span.innerText = numero;
    }

    // Comentários
    function adicionarComentario(botao) {

      const areaComentarios =
        botao.parentElement.querySelector(".comentarios");

      const input =
        botao.parentElement.querySelector(".comentarioInput");

      if (input.value.trim() === "") {
        alert("Digite um comentário!");
        return;
      }

      const comentario = document.createElement("div");

      comentario.className =
        "bg-pink-50 border border-pink-100 p-3 rounded-lg";

      comentario.innerHTML = `
        💬 ${input.value}
      `;

      areaComentarios.appendChild(comentario);

      input.value = "";
    }

  </script>

</body>
</html>
